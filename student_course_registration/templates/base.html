{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Student Course Registration{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --panel: rgba(255, 255, 255, 0.94);
            --panel-border: rgba(148, 163, 184, 0.28);
            --accent: #ea580c;
            --accent-2: #16a34a;
            --text: #0f172a;
            --muted: #475569;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(249, 115, 22, 0.12), transparent 35%),
                radial-gradient(circle at top right, rgba(34, 197, 94, 0.08), transparent 30%),
                linear-gradient(180deg, #ffffff 0%, #f8fafc 60%, #eef2ff 100%);
            min-height: 100vh;
        }

        .app-shell {
            position: relative;
            overflow: hidden;
        }

        .app-shell::before,
        .app-shell::after {
            content: '';
            position: fixed;
            inset: auto;
            border-radius: 999px;
            filter: blur(55px);
            opacity: 0.25;
            pointer-events: none;
        }

        .app-shell::before {
            width: 260px;
            height: 260px;
            left: -80px;
            top: 140px;
            background: #f97316;
        }

        .app-shell::after {
            width: 220px;
            height: 220px;
            right: -60px;
            bottom: 100px;
            background: #22c55e;
        }

        .topbar {
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.9);
            border-bottom: 1px solid rgba(148, 163, 184, 0.22);
        }

        .brand-mark {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f97316, #fb7185);
            color: white;
            font-weight: 800;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            box-shadow: 0 18px 60px rgba(15, 23, 42, 0.1);
            border-radius: 24px;
        }

        .text-muted-soft {
            color: var(--muted) !important;
        }

        .btn-accent {
            background: linear-gradient(135deg, #f97316, #fb7185);
            border: none;
            color: white;
        }

        .btn-accent:hover {
            color: white;
            filter: brightness(1.03);
        }

        .btn-ghost {
            border: 1px solid rgba(148, 163, 184, 0.35);
            color: var(--text);
            background: rgba(248, 250, 252, 0.95);
        }

        .btn-ghost:hover {
            color: #0f172a;
            background: #e2e8f0;
        }

        .form-control,
        .form-select {
            background-color: #ffffff;
            border-color: rgba(148, 163, 184, 0.42);
            color: var(--text);
        }

        .form-control:focus,
        .form-select:focus {
            background-color: #ffffff;
            border-color: rgba(249, 115, 22, 0.7);
            color: var(--text);
            box-shadow: 0 0 0 0.2rem rgba(249, 115, 22, 0.12);
        }

        .table-darkish {
            --bs-table-bg: transparent;
            --bs-table-color: var(--text);
            --bs-table-border-color: rgba(148, 163, 184, 0.3);
        }

        .badge-soft {
            border-radius: 999px;
            padding: 0.45rem 0.7rem;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="app-shell">
        <nav class="navbar navbar-expand-lg navbar-light topbar sticky-top">
            <div class="container py-2">
                <a class="navbar-brand fw-bold d-flex align-items-center gap-3" href="{% url 'student-list' %}">
                    <span class="brand-mark">SC</span>
                    <span>Student Course Registration</span>
                </a>
                <div class="ms-auto d-flex gap-2 flex-wrap">
                    <a class="btn btn-ghost btn-sm" href="{% url 'student-list' %}">Students</a>
                    <a class="btn btn-ghost btn-sm" href="{% url 'student-create' %}">Add Student</a>
                    <a class="btn btn-accent btn-sm" href="{% url 'course-create' %}">Add Course</a>
                </div>
            </div>
        </nav>

        <main class="container py-4 py-lg-5">
            {% if messages %}
            <div class="mb-4">
                {% for message in messages %}
                <div
                    class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} shadow-sm">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}

            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
