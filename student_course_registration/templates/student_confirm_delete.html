{% extends 'base.html' %}
{% block title %}Delete Student | Student Course Registration{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7 col-xl-6">
        <div class="panel p-4 p-lg-5 text-center">
            <p class="text-uppercase small text-muted-soft mb-2">Delete confirmation</p>
            <h1 class="fw-bold mb-3">Remove student record?</h1>
            <p class="text-muted-soft mb-4">
                This will permanently delete <strong>{{ student.st_name }}</strong> from the system.
            </p>

            <div class="d-flex justify-content-center gap-2 flex-wrap">
                <a href="{% url 'student-list' %}" class="btn btn-ghost px-4">Cancel</a>
                <form method="post" class="d-inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger px-4">Delete Student</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
